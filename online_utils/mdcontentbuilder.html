<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown TOC Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
            background: #f8f9fa;
        }
        h1 { color: #333; font-size: 20px; }
        textarea {
            width: 100%;
            height: 250px;
            padding: 10px;
            font-family: Consolas, monospace;
            font-size: 13px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: vertical;
        }
        .output {
            background: #fff;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            min-height: 150px;
            font-family: Consolas, monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        button {
            margin: 10px 5px 10px 0;
            padding: 8px 16px;
            background: #4a90e2;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #357abd; }
        button.copy { background: #28a745; }
        button.copy:hover { background: #1e7e34; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        .hint { font-size: 11px; color: #666; margin-top: 2px; }
    </style>
</head>
<body>
    <h1>📑 Markdown TOC Generator (GitHub Pages)</h1>
    
    <label>Markdown документ:</label>
    <textarea id="md-input" placeholder="Вставьте Markdown с заголовками ##, ###, ####, #####..."></textarea>
    <div class="hint">Поддерживаются заголовки уровней ##, ###, ####, #####</div>
    
    <button onclick="generateTOC()">🔄 Сгенерировать</button>
    <button class="copy" onclick="copyTOC()">📋 Копировать</button>
    
    <label>Содержание:</label>
    <div class="output" id="toc-output"></div>

    <script>
        function generateTOC() {
            const input = document.getElementById('md-input').value;
            const lines = input.split('\n');
            const toc = [];

            for (const line of lines) {
                const trimmed = line.trim();

                if (trimmed.startsWith('## ') && !trimmed.startsWith('### ')) {
                    const title = trimmed.substring(3).trim();
                    if (title === 'Содержание' || title === 'Table of Contents') continue;
                    const anchor = githubAnchor(title);
                    toc.push(`- [${title}](#${anchor})`);
                }
                else if (trimmed.startsWith('### ') && !trimmed.startsWith('#### ')) {
                    const title = trimmed.substring(4).trim();
                    const anchor = githubAnchor(title);
                    toc.push(`  - [${title}](#${anchor})`);
                }
                else if (trimmed.startsWith('#### ') && !trimmed.startsWith('##### ')) {
                    const title = trimmed.substring(5).trim();
                    const anchor = githubAnchor(title);
                    toc.push(`    - [${title}](#${anchor})`);
                }
                else if (trimmed.startsWith('##### ')) {
                    const title = trimmed.substring(6).trim();
                    const anchor = githubAnchor(title);
                    toc.push(`      - [${title}](#${anchor})`);
                }
            }

            if (toc.length === 0) {
                document.getElementById('toc-output').textContent = 'Заголовки ##, ###, ####, ##### не найдены.';
            } else {
                document.getElementById('toc-output').textContent = '## Содержание\n\n' + toc.join('\n');
            }
        }

        function githubAnchor(title) {
            let anchor = title.toLowerCase();

            // Удалить HTML и код
            anchor = anchor.replace(/<[^>]+>/g, '');
            anchor = anchor.replace(/`/g, '');

            // Заменить длинное тире и обычное тире
            anchor = anchor.replace(/[—–]/g, ' -- ');

            // Пробел-дефис-пробел → --- (как GitHub)
            anchor = anchor.replace(/\s+-\s+/g, '---');

            // Заменить пробелы на дефисы
            anchor = anchor.replace(/\s+/g, '-');

            // Удалить всё кроме букв, цифр, дефисов и кириллицы
            anchor = anchor.replace(/[^\w\u0400-\u04FF-]/g, '');

            // Убрать подряд идущие дефисы (оставить ---)
            anchor = anchor.replace(/-{4,}/g, '---');

            // Убрать дефисы по краям
            anchor = anchor.replace(/^-|-$/g, '');

            // URL-encode не-ASCII
            anchor = encodeURI(anchor);

            return anchor;
        }

        function copyTOC() {
            const output = document.getElementById('toc-output').textContent;
            navigator.clipboard.writeText(output).then(() => {
                alert('Содержание скопировано!');
            }).catch(() => {
                alert('Не удалось скопировать. Выделите и скопируйте вручную.');
            });
        }
    </script>
</body>
</html>
