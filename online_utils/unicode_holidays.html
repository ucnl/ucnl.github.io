<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Календарь праздников | Unicode Эмодзи</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      background-image: radial-gradient(circle at 20% 10%, #16213e 0%, #0f0f1a 90%);
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #e0e0e0;
    }

    .container {
      max-width: 700px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .today-card {
      background: linear-gradient(145deg, #2d2d44 0%, #1f1f33 100%);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 2.5rem;
      padding: 2rem 1.5rem;
      text-align: center;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), 0 0 25px rgba(255, 200, 50, 0.1);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .today-label {
      text-transform: uppercase;
      letter-spacing: 0.3rem;
      font-weight: 400;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 0.5rem;
    }

    .today-date {
      font-size: 1.2rem;
      font-weight: 500;
      color: #c0c0c0;
      margin-bottom: 1.2rem;
      background: rgba(0, 0, 0, 0.2);
      display: inline-block;
      padding: 0.3rem 1.2rem;
      border-radius: 2rem;
    }

    .today-emoji {
      font-size: 4rem;
      line-height: 1.3;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 8px 12px black);
    }

    .today-title {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(to right, #f9d423, #fda085);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.3rem;
      word-break: break-word;
    }

    .no-holiday {
      opacity: 0.8;
      font-style: italic;
      color: #b0b0b0;
      font-size: 1.5rem;
      font-weight: 400;
      margin: 1rem 0;
      background: none;
      -webkit-text-fill-color: #b0b0b0;
    }

    .full-list-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding: 0 0.5rem;
    }

    .full-list-header h2 {
      font-weight: 500;
      font-size: 1.3rem;
      color: #ddd;
      letter-spacing: 0.5px;
    }

    .holiday-grid {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .holiday-item {
      background: rgba(20, 20, 35, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.5rem;
      padding: 0.9rem 1.3rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all 0.2s ease;
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.2);
    }

    .holiday-item:hover {
      background: rgba(40, 40, 60, 0.8);
      border-color: rgba(255, 215, 0, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
    }

    .holiday-date {
      font-weight: 600;
      font-size: 0.9rem;
      background: #2a2a40;
      padding: 0.4rem 0.7rem;
      border-radius: 1rem;
      color: #f0c040;
      min-width: 3.2rem;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .holiday-emoji {
      font-size: 1.8rem;
      line-height: 1.2;
      min-width: 3rem;
      text-align: center;
    }

    .holiday-name {
      font-weight: 500;
      font-size: 1rem;
      color: #f0f0f0;
      word-break: break-word;
    }

    @media (max-width: 500px) {
      .today-emoji {
        font-size: 3rem;
      }
      .today-title {
        font-size: 1.6rem;
      }
      .holiday-item {
        gap: 0.8rem;
        padding: 0.8rem 1rem;
      }
      .holiday-emoji {
        font-size: 1.5rem;
        min-width: 2.5rem;
      }
    }

    footer {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #5a5a7a;
      text-align: center;
    }
  </style>
</head>

      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');
      const todayKey = month + day;

      document.getElementById('todayDateDisplay').textContent =
        today.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

      // Поиск сегодняшних праздников
      const todayEntries = [];
      Object.keys(holidays).forEach(key => {
        // Ключ начинается с MMDD (4 цифры)
        const keyDate = key.substring(0, 4);
        if (keyDate === todayKey) {
          todayEntries.push(holidays[key]);
        }
      });

      const emojiEl = document.getElementById('todayEmoji');
      const titleEl = document.getElementById('todayTitle');

      if (todayEntries.length > 0) {
        let allEmojis = [];
        let allNames = [];
        todayEntries.forEach(entry => {
          const parts = entry.split('|');
          if (parts.length >= 2) {
            allEmojis.push(parts[0].trim());
            allNames.push(parts[1].trim());
          }
        });
        emojiEl.textContent = allEmojis.join('  ');
        titleEl.textContent = allNames.join(' · ');
        titleEl.classList.remove('no-holiday');
      } else {
        emojiEl.textContent = '📅';
        titleEl.textContent = 'Сегодня без праздника в этой базе';
        titleEl.classList.add('no-holiday');
      }

      // Сортировка по ключу MMDD (лексикографически, но т.к. формат единый — работает как числовая)
      const allKeys = Object.keys(holidays).sort();
      const listContainer = document.getElementById('holidayList');
      document.getElementById('totalCount').textContent = `${allKeys.length} записей`;

      allKeys.forEach(key => {
        const entry = holidays[key];
        const [emojiPart, namePart] = entry.split('|').map(s => s.trim());
        if (!emojiPart || !namePart) return;

        // Извлекаем месяц и день из ключа (первые 4 символа: MMDD)
        const dateStr = key.substring(0, 4);
        const mm = dateStr.substring(0, 2);
        const dd = dateStr.substring(2, 4);
        const displayDate = `${dd}.${mm}`; // Показываем как ДД.ММ

        const itemDiv = document.createElement('div');
        itemDiv.className = 'holiday-item';
        itemDiv.innerHTML = `
          <span class="holiday-date">${displayDate}</span>
          <span class="holiday-emoji">${emojiPart}</span>
          <span class="holiday-name">${namePart}</span>
        `;
        listContainer.appendChild(itemDiv);
      });
    })();
